<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国名暗記 Pro+</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f1115;
  color: #e6e6e6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden; /* 画面ブレ防止 */
}

.container {
  width: 90%;
  max-width: 700px;
  text-align: center;
}

button {
  background: #1c1f26;
  color: white;
  border: 1px solid #444;
  padding: 15px 20px;
  margin: 10px;
  font-size: 18px;
  border-radius: 10px;
}

.question {
  font-size: 40px;
  margin: 30px 0;
}

.flag {
  font-size: 80px;
}

.answer {
  margin-top: 20px;
  font-size: 28px;
  color: #9ecbff;
  opacity: 0;
  transition: opacity 0.2s;
}

.answer.show {
  opacity: 1;
}

.pinyin {
  font-size: 22px;
  color: #aaa;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.hidden {
  display: none;
}

/* =========================
   🔥 重要：スクロール対応表
   ========================= */
#resultTable {
  max-height: 60vh;      /* 画面内に収める */
  overflow-y: auto;      /* 縦スクロール */
  border: 1px solid #333;
  border-radius: 8px;
  background: #0f1115;   /* 黒固定 */
}

/* テーブル */
table {
  width: 100%;
  border-collapse: collapse;
  background: #0f1115;   /* ここも固定 */
}

th, td {
  border: 1px solid #333;
  padding: 8px;
  font-size: 14px;
  background: #0f1115;   /* スクロールしても色維持 */
  color: #e6e6e6;
  position: sticky;      /* 見出し固定 */
  top: 0;
}

th {
  background: #151922;
  z-index: 2;
}

</style>
</head>

<body>

<div class="container">

<!-- スタート -->
<div id="startScreen">
  <h1>中国語の国名覚えようの会</h1>
  <button onclick="startGame(5)">5問</button>
  <button onclick="startGame(10)">10問</button>
  <button onclick="startGame(30)">30問</button>
  <button onclick="startGame(50)">50問</button>
</div>

<!-- ゲーム -->
<div id="gameScreen" class="hidden">

  <div class="top-bar">
    <div id="progress"></div>
    <button onclick="exitGame()">途中退出</button>
  </div>

  <div id="card"></div>

</div>

<!-- 終了 -->
<div id="endScreen" class="hidden">
  <h2>結果</h2>
  <div id="resultTable"></div>
  <button onclick="backToStart()">もう一回</button>
</div>

</div>

let quiz = [];
let index = 0;
let answered = false;

function formatPinyin(py){
  return py.split(" ").join("  ");
}

// 出題（完全ランダム＋切り出し）
function startGame(n){
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("endScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  quiz = [...countries].sort(()=>Math.random()-0.5).slice(0,n);
  index = 0;
  show();
}

function show(){
  answered = false;
  const q = quiz[index];

  document.getElementById("progress").textContent =
    `${index+1} / ${quiz.length}`;

  document.getElementById("card").innerHTML = `
    <div class="question">${q.jp}</div>
    <div class="flag">${q.flag}</div>
    <div id="ans" class="answer">
      ${q.zh}<br>
      <span class="pinyin">${formatPinyin(q.py)}</span>
    </div>
  `;
}

// タップ
document.getElementById("gameScreen").addEventListener("click", () => {
  if(!answered){
    document.getElementById("ans").classList.add("show");
    answered = true;
  } else {
    index++;
    if(index >= quiz.length){
      end();
    } else {
      show();
    }
  }
});

// 終了＋スクロール表
function end(){
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("endScreen").classList.remove("hidden");

  let html = "<table><tr><th>国旗</th><th>日本語</th><th>中国語</th><th>拼音</th></tr>";

  quiz.forEach(q=>{
    html += `
      <tr>
        <td>${q.flag}</td>
        <td>${q.jp}</td>
        <td>${q.zh}</td>
        <td>${formatPinyin(q.py)}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("resultTable").innerHTML = html;
}

function backToStart(){
  document.getElementById("endScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}

function exitGame(){
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}

</script>
