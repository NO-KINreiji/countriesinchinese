<style>
body {
  margin: 0;

  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 700px;
  text-align: center;
}

button {
  background: #1c1f26;
  color: white;
  border: 1px solid #444;
  padding: 15px 20px;
  margin: 10px;
  font-size: 18px;
  border-radius: 10px;
}

button:hover {
  background: #2a2f3a;
}

.question {
  font-size: 40px;
  margin: 30px 0;
}

.flag {
  font-size: 80px;
}

/* 揺れ防止カード */
.card {
  height: 300px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* 答え（最初非表示） */
.answer {
  margin-top: 20px;
  font-size: 28px;
  color: #9ecbff;
  opacity: 0;
  transition: opacity 0.2s;
}

.answer.show {
  opacity: 1;
}

.pinyin {
  font-size: 22px;
  color: #aaa;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div id="startScreen">

<!-- 終了 -->
<div id="endScreen" class="hidden">

// =========================
// 状態
// =========================
let quiz = [];
let index = 0;
let answered = false;

// 拼音整形
function formatPinyin(py){
  return py.split(" ").join("  ");
}

// =========================
// ランダム出題（重要）
// =========================
function startGame(count){
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("endScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  // 毎回ランダム抽出
  quiz = shuffle([...countries]).slice(0, count);

  index = 0;
  showQuestion();
}

// シャッフル
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// =========================
// 表示（固定カード）
// =========================
function showQuestion(){
  answered = false;
  const q = quiz[index];

  document.getElementById("progress").textContent =
    `${index+1} / ${quiz.length}`;

  document.getElementById("card").innerHTML = `
    <div class="question">${q.jp}</div>
    <div class="flag">${q.flag}</div>
    <div id="ans" class="answer">
      ${q.zh}<br>
      <span class="pinyin">${formatPinyin(q.py)}</span>
    </div>
  `;
}

// =========================
document.getElementById("gameScreen").addEventListener("click", () => {

  if(index >= quiz.length) return;

  if(!answered){
    document.getElementById("ans").classList.add("show");
    answered = true;
  } else {
    index++;
    if(index >= quiz.length){
      endGame();
    } else {
      showQuestion();
    }
  }
});

// =========================
// 終了
// =========================
function endGame(){
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("endScreen").classList.remove("hidden");
}

// 戻る
function backToStart(){
  document.getElementById("endScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}

// 退出
function exitGame(){
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}

</script>
